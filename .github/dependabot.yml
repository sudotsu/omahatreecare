version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Controlled grouping so routine patch/minor bumps arrive as a few reviewable
    # PRs instead of one-per-package noise. Majors stay separate for scrutiny.
    # Watch especially for a Next release that carries sharp >= 0.35 (SEC-002).
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
